<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- No static <meta name="description"> on purpose: PageMeta renders a per-route one at
         runtime, and React 19 *appends* metadata rather than replacing it, so a static tag here
         would leave two description tags in <head> (a first-match crawler would read the generic
         one). Google runs the SPA and gets the per-route description; the og/twitter descriptions
         below still cover non-JS social crawlers (Slack, LinkedIn, X, iMessage). -->
    <!-- Static share-card defaults for non-JS crawlers, which never run the SPA. React sets
         richer per-page <title>/<meta> at runtime for Google. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="latent-space" />
    <meta property="og:title" content="latent-space - Cristian C. Spagnuolo" />
    <meta
      property="og:description"
      content="NLP engineer. I make language models run faster, fit in less GPU memory, and stop confidently inventing things. Part portfolio, part lab notebook."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="latent-space - Cristian C. Spagnuolo" />
    <meta
      name="twitter:description"
      content="NLP engineer. Part portfolio, part lab notebook, part applied-ML performance art."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <!-- TODO(deploy): once the canonical host/domain is decided, add <meta property="og:url">
         and switch og:image/twitter:image to absolute URLs — some scrapers ignore relative images. -->
    <title>latent-space</title>
    <script>
      // Apply the stored (or system) theme before first paint to avoid a flash.
      // Mirrors resolveInitialTheme() in src/lib/theme.ts; keep the key in sync.
      ;(function () {
        try {
          var stored = localStorage.getItem('ls-theme')
          var theme =
            stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          document.documentElement.classList.toggle('dark', theme === 'dark')
        } catch (e) {
          /* default light theme if storage/matchMedia is unavailable */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <!-- The forward-pass hero enhances this text; the bio must never depend on JS.
           Mirror CANONICAL_BIO in src/features/forward-pass-hero/content.ts. -->
      <main style="max-width: 40rem; margin: 2rem auto; padding: 0 1rem; font-family: sans-serif">
        <h1>Who is Cristian?</h1>
        <p>
          Hi, I'm Cristian, and this is my latent space. I'm an NLP engineer at Artificialy in
          Lugano, where I make large language models run faster, fit in less GPU memory, and
          stop confidently making things up. The part I care about is the one most people skip:
          not that something works, but why. So on weekends I rebuilt GPT-2 from scratch in
          PyTorch 🛠️. Credentials (Politecnico di Milano, cum laude, bla, bla, bla... 🥱) on the
          resume. I'm a nerd, I like it 🤓, and I'd spend the rest of my life watching
          training-loss curves go down 📉.
        </p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
