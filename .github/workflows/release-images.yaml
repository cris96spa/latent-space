name: Release Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash

jobs:
  verify-release-tag:
    runs-on: ubuntu-latest
    outputs:
      is_release_tag: ${{ steps.verify.outputs.is_release_tag }}
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Verify semver tag points to main
        id: verify
        run: |
          tag_name="${GITHUB_REF_NAME}"

          if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$tag_name' is not a stable semver tag (vX.Y.Z)."
            echo "is_release_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag_commit="$(git rev-list -n 1 "$tag_name")"
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Tag $tag_name points to a commit reachable from main."
            echo "is_release_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $tag_name is not on main. Skipping image release."
            echo "is_release_tag=false" >> "$GITHUB_OUTPUT"
          fi

  release-images:
    needs: verify-release-tag
    if: needs.verify-release-tag.outputs.is_release_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: 🧾 Collect image metadata
        id: metadata
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "python_version=$(tr -d '[:space:]' < .python-version)" >> "$GITHUB_OUTPUT"

      - name: 🐳 Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            PYTHON_VERSION=${{ steps.metadata.outputs.python_version }}
          tags: |
            ghcr.io/${{ steps.metadata.outputs.owner_lc }}/latent-space-backend:${{ steps.metadata.outputs.tag_name }}

      - name: 🌐 Build and push edge image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.metadata.outputs.owner_lc }}/latent-space-edge:${{ steps.metadata.outputs.tag_name }}
