name: Build Frontend and Images

on:
  push:
    branches:
      - main
      - dev
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: ⬢ Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 🦾 Install dependencies
        run: npm ci

      - name: 🧹 Lint
        run: npm run lint

      - name: 🏗️ Build
        run: npm run build

  images:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: 🐳 Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build backend and edge images
        run: docker compose build
