name: Frontend Validate

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

defaults:
  run:
    shell: bash
    working-directory: frontend

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: ⬢ Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install
        run: npm ci

      - name: 🔎 Lint
        run: npm run lint

      - name: 🧪 Unit tests
        run: npm run test

      - name: 🏗️ Build
        run: npm run build

      - name: 📏 Bundle budget
        run: npm run test:bundle

      - name: 🌐 Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: 🎭 End-to-end smoke tests
        run: npm run test:e2e

  lighthouse:
    runs-on: ubuntu-latest
    needs: frontend
    continue-on-error: true
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: ⬢ Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

      - name: 💡 Lighthouse (advisory)
        run: npx lhci autorun
