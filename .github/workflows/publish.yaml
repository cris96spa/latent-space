name: Publish

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    shell: bash

# First, checks out repository, installs dependencies, and runs tests.
# Then, builds the package and publishes it to PyPI.

jobs:
  verify-release-tag:
    runs-on: ubuntu-latest
    outputs:
      is_release_tag: ${{ steps.verify.outputs.is_release_tag }}
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Verify semver tag points to main
        id: verify
        run: |
          tag_name="${GITHUB_REF_NAME}"

          if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$tag_name' is not a stable semver tag (vX.Y.Z)."
            echo "is_release_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag_commit="$(git rev-list -n 1 "$tag_name")"
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Tag $tag_name points to a commit reachable from main."
            echo "is_release_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $tag_name is not on main. Skipping publish."
            echo "is_release_tag=false" >> "$GITHUB_OUTPUT"
          fi

  format-lint-test:
    needs: verify-release-tag
    if: needs.verify-release-tag.outputs.is_release_tag == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: ✅ validate code
        env:
          PY_VERSION: ${{ matrix.python-version }}

        uses: ./.github/actions/validation

  publish:
    runs-on: ubuntu-latest
    needs: format-lint-test
    # Uncomment to run this job on a custom environment.
    # environment: pypi

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: 📦 Install uv
        uses: astral-sh/setup-uv@v6

      - name: 🏗️ Build distribution
        run: uv build

      # REMEMBER TO SET THE PYPI_TOKEN SECRET IN YOUR REPO SETTINGS!!
      - name: 📩 Set PYPI token as env variable for UV
        run: echo "UV_PUBLISH_TOKEN=${{ secrets.PYPI_TOKEN }}" >> $GITHUB_ENV

      - name: 📢 Publish to PyPI
        run: uv publish

      - name: 👌 Check upload
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG:1}
          echo "Version: $VERSION"
          uv run --with latent-space==$VERSION --no-project -- python -c "import latent_space"
