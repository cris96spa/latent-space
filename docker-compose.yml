services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: latent-space-backend:${IMAGE_TAG:-latest}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  edge:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: latent-space-edge:${IMAGE_TAG:-latest}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${EDGE_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
